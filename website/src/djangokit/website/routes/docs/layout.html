{% extends "layout.html" %}

{% block main %}
    <style>
        #docs-nav {
            border-right-width: 0 !important;
            border-bottom-width: var(--bs-border-width) !important;
            @media (min-width: 768px) {
                border-right-width: var(--bs-border-width) !important;
                border-bottom-width: 0 !important;
            }
        }
    </style>

    <div class="d-flex flex-column flex-md-row flex-fill">
        <nav id="docs-nav" class="navbar navbar-expand-md flex-md-column px-1 py-3 bg-light border-end border-bottom"
             aria-label="Docs navigation">

            <button type="button"
                    class="navbar-toggler d-md-none w-100"
                    data-bs-toggle="collapse"
                    data-bs-target="#docs-nav-items"
                    aria-controls="docs-nav-items"
                    aria-expanded="false"
                    aria-label="Toggle main navigation">
                <span class="navbar-toggler-icon"></span>
                <span>Docs Menu</span>
            </button>

            <div id="docs-nav-items" class="collapse navbar-collapse flex-column">
                <ul class="navbar-nav flex-column">
                    {% for page in data.pages %}
                        <li class="nav-item">
                            <a href="/docs/{{ page.slug|slice:"4:" }}"
                               class="nav-link lh-1 text-decoration-underline
                                      {% if not page.published %}text-danger text-decoration-line-through{% endif %}">
                                {{ page.title }}
                            </a>
                        </li>
                    {% endfor %}
                </ul>
            </div>
        </nav>

        <div class="p-3 flex-fill">
            {% block outlet %}{% endblock outlet %}
        </div>
    </div>
{% endblock main %}
