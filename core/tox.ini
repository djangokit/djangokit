[tox]
isolated_build = true

envlist =
    py310-django{4,5}
    py311-django{4,5}
    py312-django{4,5,6}
    py313-django{5,6}
    py314-django{5,6}

[testenv]
deps =
    pytest
    pytest-django
    ruff
    django4: Django>=4.2,<4.3
    django5: Django>=5.2,<5.3
    django6: Django>=6.0,<6.1
    .

setenv =
    DJANGO_SETTINGS_FILE=src/djangokit/core/test/settings.test.toml
    DJANGO_SECRET_KEY="TEST-SECRET-KEY-TOX"
    DJANGO_API_KEY="TEST-API-KEY-TOX"

commands =
    pytest -rA --disable-warnings
    ruff check .
